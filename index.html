<!DOCTYPE html>
<html lang="es">

<head>
    <script src="/global-head.js"></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cocacolalandia</title>

    <!-- FUENTES Y BOOTSTRAP ICONS (Alternativa robusta) -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary: #ff003c;
            --bg: #0a0a0a;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --font: 'Space Grotesk', sans-serif;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font) !important;
        }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(255, 0, 60, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 60, 0.05) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            display: grid;
            grid-template-columns: 100px 1fr;
            height: 100vh;
        }

        /* BARRA LATERAL */
        nav {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            gap: 25px;
            z-index: 100;
        }

        /* LOGO OFICIAL */
        .brand-logo {
            width: 65px;
            height: 65px;
            object-fit: contain;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 8px rgba(255, 0, 60, 0.4));
            cursor: pointer;
            transition: var(--transition);
        }

        .brand-logo:hover {
            transform: scale(1.1) rotate(-5deg);
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
        }

        .nav-link:hover {
            color: var(--primary);
            background: rgba(255, 0, 60, 0.1);
        }

        .nav-link.active {
            color: var(--primary);
            background: rgba(255, 0, 60, 0.08);
        }

        /* CONTENIDO */
        main {
            padding: 50px 60px;
            overflow-y: auto;
        }

        .search-container {
            margin-bottom: 50px;
            max-width: 500px;
        }

        .search-box {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 15px 25px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: var(--transition);
        }

        .search-box:focus-within {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.06);
        }

        .search-box input {
            background: none;
            border: none;
            color: white;
            outline: none;
            font-size: 1.1rem;
            width: 100%;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        /* GRID Y CARTAS */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 12px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 0, 60, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card-img-wrapper {
            width: 100%;
            height: 180px;
            border-radius: 22px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.6s ease;
        }

        .card:hover img {
            transform: scale(1.1);
        }

        .card-body h3 {
            font-weight: 700;
            margin-bottom: 5px;
            font-size: 1.3rem;
        }

        .card-body p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 300;
        }

        /* Botón Jugar */
        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: var(--transition);
            z-index: 2;
        }

        .card:hover .play-overlay {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        @media (max-width: 768px) {
            .app-container {
                grid-template-columns: 1fr;
            }

            nav {
                flex-direction: row;
                width: 100%;
                height: 80px;
                position: fixed;
                bottom: 0;
                justify-content: space-around;
                padding: 0;
            }

            .brand-logo {
                display: none;
            }

            main {
                padding: 30px 20px 100px;
            }
        }
    </style>
</head>

<body>
<div id="loader-container">
    <img src="https://imgur.com/a/qfpmqB7" alt="Loader" id="loader-img">
    <div id="loader-text">Calculando cuánto cuesta tu coche</div>
</div>

<div id="main-content">

<style>
    #loader-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #0a0a0a;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
    }

    #loader-img {
        width: 150px;
        height: auto;
        border-radius: 50%;
        animation: spin 2s linear infinite;
        margin-bottom: 20px;
    }

    #loader-text {
        color: #ffffff;
        font-size: 1.2rem;
        font-weight: 500;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    #main-content {
        display: none;
    }
</style>

<script>
    window.addEventListener('load', function() {
        setTimeout(function() {
            document.getElementById('loader-container').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }, 5000);
    });
</script>
    
    <div class="app-container">
        <nav>
            <img src="https://i.imgur.com/PPO7d2j.png" class="brand-logo" onclick="location.reload()">

            <div class="nav-link active" title="Inicio" onclick="location.reload()"><i class="bi bi-house-door-fill"></i></div>
            <div class="nav-link" title="Juegos" onclick="window.location.href='/juegos'"><i class="bi bi-controller"></i></div>
            <div class="nav-link" title="Chat" onclick="window.open('https://cocacolalandia1.github.io/chat')"><i class="bi bi-chat-dots-fill"></i></div>
            <!-- Icono Nuclear (bi-radioactive) -->
            <div class="nav-link" title="Pánico" onclick="window.location.href='https://classroom.google.com'"><i class="bi bi-radioactive"></i></div>
            <div class="nav-link" title="Tema" onclick="cambiarTema()"><i class="bi bi-palette-fill"></i></div>
        </nav>

        <main>
            <div class="search-container">
                <div class="search-box">
                    <i class="bi bi-search" style="color: var(--primary)"></i>
                    <input type="text" id="gameSearch" placeholder="¿A qué quieres jugar hoy?">
                </div>
            </div>

            <div class="games-grid" id="grid"></div>
        </main>
    </div>

    <script>
        const games = [{
                name: "1v1.LOL",
                desc: "Battle Royale Arena",
                img: "https://images.crazygames.com/games/1v1-lol/cover-1585728351086.png",
                link: "https://cocacolalandia1.github.io/juegos?search=1+v+1"
            },
            {
                name: "Slope",
                desc: "Descenso infinito",
                img: "https://img.y8.com/cloud/y8-thumbs/246/thumbnail464x348.jpg",
                link: "https://cocacolalandia1.github.io/juegos?search=slope"
            },
            {
                name: "Among Us",
                desc: "Encuentra al traidor",
                img: "https://cdn1.epicgames.com/salesEvent/salesEvent/amoguslandscape_2560x1440-3fac17e8bb45d81ec9b2c24655758075",
                link: "https://cocacolalandia1.github.io/juegos?search=among+us"
            },
            {
                name: "12 Minibattles",
                desc: "Duelos arcade",
                img: "https://imgs.crazygames.com/games/12-minibattles/cover_16x9-1707829553932.png",
                link: "https://cocacolalandia1.github.io/juegos?search=minibattles"
            },
            {
                name: "Granny",
                desc: "No hagas ruido",
                img: "https://play-lh.googleusercontent.com/XPM8u_fQrERAQFNp1byQgCphu6_q_WSrJutTm2PF9iQBYbOhVu3ubliUxHaoZVdhyro=w526-h296-rw",
                link: "https://cocacolalandia1.github.io/juegos?search=granny"
            },
            {
                name: "Baldi Basics",
                desc: "Terror escolar",
                img: "https://play-lh.googleusercontent.com/Cl3q99D2bBmKlP_lHfA1h0sw-G0GKrpuvQZ2Mk1ZiXST8Q3AjWqOepPVKzrIFoMCtzQ=w526-h296-rw",
                link: "https://cocacolalandia1.github.io/juegos?search=baldi"
            },
            {
                name: "Crossy Road",
                desc: "Esquiva el tráfico",
                img: "https://i.blogs.es/198eb8/crossy/450_1000.webp",
                link: "https://cocacolalandia1.github.io/juegos?search=crossy"
            },
            {
                name: "Subway Surfers",
                desc: "Parkour infinito",
                img: "https://unity.com/_next/image?url=https%3A%2F%2Fcdn.bfldr.com%2FS5BC9Y64%2Fat%2Fmchpwh4jw8ct4nr7tnjvgnxs%2FSubwaySurfers-FeaturedImage.jpg%3Fauto%3Dwebp&w=3840&q=75",
                link: "https://cocacolalandia1.github.io/juegos?search=subwaysurfers"
            },
            {
                name: "Minecraft",
                desc: "Mundo abierto",
                img: "https://xboxwire.thesourcemediaassets.com/sites/4/15YR_Free_Cape-1-7cbcb0739e3df57534ec-9063efed017354d1b1c3.jpg",
                link: "https://cocacolalandia1.github.io/juegos?search=minecraft"
            },
            {
                name: "Geometry Dash",
                desc: "Ritmo y saltos",
                img: "https://m.media-amazon.com/images/I/61CCVhzkDeL.png",
                link: "https://cocacolalandia1.github.io/juegos?search=geometrydash"
            },
            {
                name: "Plantas vs Zombies",
                desc: "Defensa táctica",
                img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTiG2JRHlL7RoyZ4ZkOeNpg1nkZRtu1CWuLww&s",
                link: "https://cocacolalandia1.github.io/juegos?search=plantsvszombies"
            },
            {
                name: "FNAF 1",
                desc: "Cinco noches",
                img: "https://i.imgur.com/vU9R3AN.png",
                link: "https://cocacolalandia1.github.io/juegos?search=fnaf"
            }
        ];

        function render(filter = "") {
            const grid = document.getElementById("grid");
            grid.innerHTML = "";
            games.filter(g => g.name.toLowerCase().includes(filter.toLowerCase())).forEach(game => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <div class="play-overlay"><i class="bi bi-play-fill" style="font-size: 2rem; color: white"></i></div>
                    <div class="card-img-wrapper"><img src="${game.img}" loading="lazy"></div>
                    <div class="card-body"><h3>${game.name}</h3><p>${game.desc}</p></div>
                `;
                card.onclick = () => window.open(game.link, '_blank');
                grid.appendChild(card);
            });
        }

        document.getElementById("gameSearch").oninput = (e) => render(e.target.value);
        render();
    </script>
</body>

</html>
