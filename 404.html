<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página no encontrada | Cocacolalandia</title>
    <!-- Font Awesome para los iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Tu tipografía Space Grotesk -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* TUS VARIABLES EXACTAS */
        :root {
            --primary: #ff003c;
            --bg: #0a0a0a;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --font: 'Space Grotesk', sans-serif;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            /* CRÍTICO: Para que el footer de global-head no se ponga al lado */
            display: block !important; 
            overflow-x: hidden;
        }

        /* BARRA LATERAL FIJA */
        nav {
            position: fixed !important;
            left: 0;
            top: 0;
            bottom: 0;
            width: 80px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            z-index: 1000;
        }

        .brand-logo {
            width: 50px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 10px var(--primary));
            cursor: pointer;
            transition: var(--transition);
        }

        .brand-logo:hover {
            transform: scale(1.1);
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.2);
            font-size: 1.5rem;
            margin-bottom: 25px;
            cursor: pointer;
            transition: var(--transition);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .nav-link:hover {
            color: var(--primary);
            background: rgba(255, 0, 60, 0.1);
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.1);
        }

        /* CONTENIDO 404 */
        .main-content {
            margin-left: 80px; /* Espacio para la nav */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            box-sizing: border-box;
        }

        .error-num {
            font-size: clamp(8rem, 20vw, 15rem);
            font-weight: 700;
            line-height: 0.8;
            margin: 0;
            background: linear-gradient(to bottom, var(--primary), #bc13fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(255, 0, 60, 0.4));
        }

        .error-text {
            font-size: 2rem;
            font-weight: 500;
            margin: 20px 0 10px 0;
            letter-spacing: 1px;
        }

        .error-desc {
            color: rgba(255, 255, 255, 0.5);
            max-width: 500px;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .btn-glow {
            padding: 18px 40px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: var(--transition);
            box-shadow: 0 10px 30px rgba(255, 0, 60, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-glow:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255, 0, 60, 0.5);
            filter: brightness(1.2);
        }

        /* AJUSTE PARA EL FOOTER INYECTADO POR GLOBAL-HEAD.JS */
        footer, body > footer {
            display: block !important;
            position: relative !important; /* Lo manda al final del contenido */
            margin-left: 80px !important; /* Lo separa de la nav lateral */
            width: calc(100% - 80px) !important;
            background: var(--surface) !important;
            padding: 60px 20px !important;
            border-top: 1px solid var(--border);
            box-sizing: border-box !important;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- TU SCRIPT GLOBAL -->
    <script src="/global-head.js"></script>

    <nav>
        <img src="https://i.imgur.com/PPO7d2j.png" class="brand-logo" onclick="location.href='/juegos'">
        <div class="nav-link" title="Inicio" onclick="location.href='/juegos'"><i class="fa-solid fa-house"></i></div>
        <div class="nav-link" title="Chat" onclick="window.open('https://matesfaciles.github.io/chat')"><i class="fa-solid fa-comment-dots"></i></div>
        <div class="nav-link" title="Pánico" onclick="window.location.href='https://classroom.google.com'"><i class="fa-solid fa-radiation"></i></div>
    </nav>

    <div class="main-content">
        <h1 class="error-num">404</h1>
        <div class="error-text">¿TE HAS PERDIDO?</div>
        <p class="error-desc">
            Esta página no existe o ha sido eliminada. 
        </p>
        <a href="/juegos" class="btn-glow">Volver a los juegos</a>
    </div>

</body>
</html>
